<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blob Paint Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="studio">
    <aside class="tools panel" aria-label="Painting tools">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <h1>Blob Paint</h1>
          <p>Studio</p>
        </div>
      </div>

      <section>
        <div class="section-title">Color</div>
        <div class="color-row">
          <input id="colorPicker" type="color" value="#f25f4c" aria-label="Paint color">
          <div class="swatches" id="swatches"></div>
        </div>
        <label class="slider-label" for="opacitySlider">
          <span>Opacity</span><output id="opacityValue">100%</output>
        </label>
        <input id="opacitySlider" type="range" min="1" max="100" value="100">
        <label class="slider-label" for="sizeSlider">
          <span>Size</span><output id="sizeValue">18</output>
        </label>
        <input id="sizeSlider" type="range" min="2" max="96" value="18">
      </section>

      <section>
        <div class="section-title">Actions</div>
        <div class="button-grid two">
          <button id="undoBtn" class="action-btn" title="Undo" aria-label="Undo">↶</button>
          <button id="redoBtn" class="action-btn" title="Redo" aria-label="Redo">↷</button>
        </div>
      </section>

      <section>
        <div class="section-title">Tools</div>
        <div class="button-grid" id="toolButtons">
          <button class="tool-btn active" data-tool="draw" title="Draw" aria-label="Draw">✎</button>
          <button class="tool-btn" data-tool="erase" title="Erase" aria-label="Erase">⌫</button>
          <button class="tool-btn" data-tool="picker" title="Color picker" aria-label="Color picker">◉</button>
          <button class="tool-btn" data-tool="bucket" title="Fill bucket" aria-label="Fill bucket">▣</button>
          <button class="tool-btn" data-tool="select" title="Select" aria-label="Select">□</button>
          <button class="tool-btn" data-tool="lasso" title="Lasso" aria-label="Lasso">◇</button>
          <button class="tool-btn" data-tool="line" title="Line" aria-label="Line">╱</button>
          <button class="tool-btn" data-tool="square" title="Square" aria-label="Square">▢</button>
          <button class="tool-btn" data-tool="circle" title="Circle" aria-label="Circle">○</button>
          <button class="tool-btn" data-tool="triangle" title="Triangle" aria-label="Triangle">△</button>
        </div>
      </section>

      <section>
        <div class="section-title">Selection</div>
        <div class="button-grid two">
          <button id="cutBtn" class="text-btn">Cut</button>
          <button id="copyBtn" class="text-btn">Copy</button>
          <button id="pasteBtn" class="text-btn">Paste</button>
          <button id="clearSelBtn" class="text-btn">Clear</button>
        </div>
      </section>
    </aside>

    <section class="canvas-wrap">
      <div class="topbar">
        <div class="status">
          <strong id="activeToolLabel">Draw</strong>
          <span id="hint">Paint layer</span>
        </div>
        <div class="export-group">
          <button id="clearCanvasBtn" class="text-btn">Clear Layer</button>
          <button id="downloadBtn" class="text-btn primary">Download</button>
        </div>
      </div>
      <div class="stage-shell">
        <canvas id="paintCanvas" width="1152" height="768" aria-label="Painting canvas"></canvas>
        <canvas id="overlayCanvas" width="1152" height="768" aria-hidden="true"></canvas>
      </div>
    </section>

    <aside class="side panel">
      <section>
        <div class="section-title">Blobby Prompts</div>
        <div id="blobGallery" class="blob-gallery"></div>
      </section>

      <section class="layers-section">
        <div class="layer-head">
          <div class="section-title">Layers</div>
          <button id="addLayerBtn" class="icon-text">＋</button>
        </div>
        <div class="button-grid two layer-actions">
          <button id="gradientLayerBtn" class="text-btn">Gradient</button>
          <button id="mergeLayerBtn" class="text-btn">Merge</button>
        </div>
        <label class="slider-label" for="layerOpacitySlider">
          <span>Layer Opacity</span><output id="layerOpacityValue">100%</output>
        </label>
        <input id="layerOpacitySlider" type="range" min="0" max="100" value="100">
        <div id="layersList" class="layers-list"></div>
      </section>
    </aside>
  </main>

  <template id="layerTemplate">
    <div class="layer-item">
      <button class="layer-name"></button>
      <div class="layer-tools">
        <button class="mini up" title="Move layer up">↑</button>
        <button class="mini down" title="Move layer down">↓</button>
        <button class="mini clear" title="Clear layer">⌧</button>
        <button class="mini delete" title="Delete layer">×</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
